name: Publish to JSR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  BUN_VERSION: "1.3.10"

jobs:
  # NOTE: npm publishing is disabled until the @conduit scope is available.
  # To re-enable, uncomment the publish-npm job below and rename this workflow
  # back to "Publish to NPM & JSR".
