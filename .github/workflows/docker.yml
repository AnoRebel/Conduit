name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.TAG }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"
          REPO="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "repo=${REPO}" >> $GITHUB_OUTPUT

          for image in server server-admin admin-ui all-in-one; do
            TAGS="${REPO}/${image}:${VERSION}"
            TAGS="${TAGS},${REPO}/${image}:${MINOR}"
            TAGS="${TAGS},${REPO}/${image}:${MAJOR}"
            TAGS="${TAGS},${REPO}/${image}:latest"
            echo "${image//-/_}_tags=${TAGS}" >> $GITHUB_OUTPUT
          done

      - name: Build and push server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.server_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push server-admin
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.server-admin
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.server_admin_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push admin-ui
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.admin-ui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.admin_ui_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push all-in-one
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.all-in-one
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.all_in_one_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create docker summary
        run: |
          echo "## Docker Images Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Server" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.tags.outputs.repo }}/server:${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Server with Admin API" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.tags.outputs.repo }}/server-admin:${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Admin UI (standalone)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.tags.outputs.repo }}/admin-ui:${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### All-in-One (Server + Admin API + Dashboard)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.tags.outputs.repo }}/all-in-one:${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
